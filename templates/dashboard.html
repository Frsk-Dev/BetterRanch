<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — BetterRanch</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --accent:  #8c1a1a;
            --bg:      #09090b;
            --surface: #111113;
            --border:  #1c1c1f;
            --text:    #fafafa;
            --muted:   #71717a;
            --subtle:  #3f3f46;
        }

        body {
            font-family: "Inter", -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2.5rem;
            height: 60px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
        }

        .nav-logo {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text);
            text-decoration: none;
            letter-spacing: -0.02em;
        }

        .nav-logo span { color: var(--accent); }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .nav-user {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text);
        }

        .nav-user img {
            width: 28px;
            height: 28px;
            border-radius: 50%;
        }

        .nav-logout {
            font-size: 0.8rem;
            color: var(--muted);
            text-decoration: none;
            transition: color 0.15s;
        }

        .nav-logout:hover { color: var(--text); }

        main {
            max-width: 900px;
            margin: 0 auto;
            padding: 3rem 2rem;
        }

        .page-title {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            margin-bottom: 0.375rem;
        }

        .page-sub {
            font-size: 0.875rem;
            color: var(--muted);
            margin-bottom: 2.5rem;
        }

        .placeholder {
            background: var(--surface);
            border: 1px dashed var(--border);
            border-radius: 12px;
            padding: 4rem 2rem;
            text-align: center;
            color: var(--subtle);
            font-size: 0.875rem;
        }
    </style>
</head>
<body>

    <nav>
        <a href="/" class="nav-logo">Better<span>Ranch</span></a>
        <div class="nav-right">
            <div class="nav-user">
                <img src="{{ user.avatar_url }}" alt="avatar">
                {{ user.username }}
            </div>
            <a href="/logout" class="nav-logout">Logout</a>
        </div>
    </nav>

    <main>
        <h1 class="page-title">Welcome back, {{ user.username }}</h1>
        <p class="page-sub">Select a server below to view stats or configure channels.</p>

        <div class="placeholder">
            Guild list coming soon.
        </div>
    </main>

</body>
</html>
